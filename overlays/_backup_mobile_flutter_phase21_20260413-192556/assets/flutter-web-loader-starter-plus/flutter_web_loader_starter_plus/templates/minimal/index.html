<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter web application">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flutter Web App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="boot-loader" class="boot-loader" role="status" aria-live="polite">
    <div class="boot-card">
      <img class="boot-logo" src="icons/Icon-192.png" alt="App logo" />
      <div class="boot-title">Loading application…</div>
      <div class="boot-subtitle" id="boot-status">Starting…</div>
      <div class="progress-container" aria-hidden="true">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text">10%</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
