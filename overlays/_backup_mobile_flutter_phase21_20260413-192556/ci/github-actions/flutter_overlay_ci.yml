name: Flutter Overlay CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  flutter-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Run tests
        run: flutter test

      # Enable if your repo builds web in CI
      # - name: Build web
      #   run: flutter build web --release
