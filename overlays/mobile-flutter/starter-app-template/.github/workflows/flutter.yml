name: Flutter CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: flutter pub get
      - run: bash tooling/policy_check.sh
      - run: python scripts/generate_l10n_from_csv.py
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
