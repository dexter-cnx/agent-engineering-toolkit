name: Doc Governance

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 tools/ci/doc_lint.py
      - run: python3 tools/ci/link_check.py
