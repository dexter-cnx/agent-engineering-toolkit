name: Toolkit CI

on:
  push:
  pull_request:

jobs:
  os-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Enforce OS invariants
        run: python3 tools/ci/os_invariant_check.py
      - name: Validate canonical docs and links
        run: |
          python3 tools/ci/doc_lint.py
          python3 tools/ci/link_check.py

  mobile-flutter-skill-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Mobile Flutter skill structure
        run: bash tools/skillgen/bin/skillgen check --overlay overlays/mobile-flutter
      - name: Sync Mobile Flutter skill index
        run: bash tools/skillgen/bin/skillgen sync-index --overlay overlays/mobile-flutter --check
      - name: Check Mobile Flutter skill overlap
        run: bash tools/skillgen/bin/skillgen overlap --overlay overlays/mobile-flutter --fail-on-overlap --report overlays/mobile-flutter/docs/skill-overlap-report.md
      - name: Check Mobile Flutter docs consistency
        run: bash tools/skillgen/bin/skillgen docs-check --overlay overlays/mobile-flutter

  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check public repo files
        run: |
          bash scripts/check-public-repo.sh
          test -d prompts
          test -d skills
          test -d overlays
          for overlay_dir in overlays/*; do
            if [ -d "$overlay_dir" ]; then
              test -d "$overlay_dir/examples"
            fi
          done
