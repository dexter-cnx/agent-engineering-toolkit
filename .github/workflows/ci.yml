name: Toolkit CI

on:
  push:
  pull_request:

jobs:
  os-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"
      - name: Enforce OS invariants
        run: python3 tools/ci/os_invariant_check.py
      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "22"
      - name: Install Node dependencies
        run: npm ci
      - name: Build compiled CLI
        run: npm run build:cli
      - name: Validate compiled CLI smoke
        run: |
          test -f dist/cli.js
          node dist/cli.js validate
          node dist/cli.js overlays list --json
      - name: Validate canonical docs and links
        run: |
          python3 tools/ci/doc_lint.py
          python3 tools/ci/coherence_lint.py
          python3 tools/ci/link_check.py
          node --experimental-strip-types tools/ci/check-canonical-consistency.ts
          node --experimental-strip-types tools/ci/check-merge-gate-consistency.ts
          node tools/ci/check-package-metadata.ts
          node --test tests/runtime/runtime.test.mjs
      - name: Validate overlays, prompts, and memory contracts
        run: |
          python3 tools/ci/overlay_lint.py
          python3 tools/ci/prompt_lint.py
          python3 tools/ci/memory_lint.py
      - name: Enforce compiled prompt consistency
        run: |
          python3 tools/prompts/compile_prompts.py
          python3 tools/prompts/validate_prompt_pack.py
          git diff --exit-code prompts/compiled
      - name: Quickstart smoke verification
        run: |
          python3 tools/memory/state_rollup.py
          test -f prompts/compiled/codex-runtime.md
          test -f prompts/compiled/claude-runtime.md
          test -f prompts/compiled/gemini-runtime.md
          test -f artifacts/memory-state-rollup.md

  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check public repo files
        run: |
          bash scripts/check-public-repo.sh
          test -d docs
          test -d agents
          test -d memory
          test -d system
          test -d prompts
          test -d overlays
          test -d tools
          test -d runtime
