name: Release Check

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Check public repo files
        run: bash scripts/check-public-repo.sh

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Build CLI
        run: npm run build:cli

      - name: Package dry-run (JSON)
        run: npm pack --dry-run --json > pack-dry-run.json

      - name: Assert packed files are release-safe
        run: |
          node - <<'NODE'
          const fs = require('node:fs');

          const result = JSON.parse(fs.readFileSync('pack-dry-run.json', 'utf8'));
          const files = result?.[0]?.files?.map((f) => f.path) ?? [];

          const forbiddenPrefixes = ['audits/', 'reports/', 'samples/', 'apps/', 'examples/'];
          const allowedPrefixes = [
            'tools/os/bin/',
            'dist/',
            'runtime/',
            'docs/overlays.manifest.json',
            'prompts/compiled/',
            'README.md',
            'LICENSE',
            'package.json',
            'tools/README.md',
            'docs/README.md',
            'prompts/README.md',
            'runtime/README.md',
            'runtime/adapters/README.md',
            'tools/os/README.md'
          ];

          const forbidden = files.filter((file) => forbiddenPrefixes.some((prefix) => file.startsWith(prefix)));
          if (forbidden.length > 0) {
            console.error(`Forbidden files in package: ${forbidden.join(', ')}`);
            process.exit(1);
          }

          const outsideAllowlist = files.filter(
            (file) => !allowedPrefixes.some((prefix) => file === prefix || file.startsWith(prefix)),
          );

          if (outsideAllowlist.length > 0) {
            console.error(`Files outside allowlist: ${outsideAllowlist.join(', ')}`);
            process.exit(1);
          }

          console.log(`Packed files validated (${files.length} files).`);
          NODE

      - name: Create release tarball
        run: npm pack --json > pack.json

      - name: Resolve tarball path
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const pack = JSON.parse(fs.readFileSync('pack.json', 'utf8'));
          const filename = pack?.[0]?.filename;
          if (!filename) {
            console.error('Unable to resolve packed tarball filename from pack.json');
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `PACK_TARBALL=${filename}\n`);
          console.log(`PACK_TARBALL=${filename}`);
          NODE

      - name: Install tarball in clean temp project
        run: |
          mkdir -p /tmp/test-install
          cd /tmp/test-install
          npm init -y
          npm install "$GITHUB_WORKSPACE/$PACK_TARBALL"

      - name: CLI smoke tests (exit code + JSON + overlays)
        run: |
          cd /tmp/test-install

          validate_json=$(npx --yes os validate)
          overlays_json=$(npx --yes os overlays list --json)

          overlay_name=$(node -e 'const data = JSON.parse(process.argv[1]); if (!Array.isArray(data.overlays) || data.overlays.length === 0) process.exit(1); process.stdout.write(data.overlays[0].name);' "$overlays_json")
          run_json=$(npx --yes os run "$overlay_name" --json)

          node - <<'NODE' "$validate_json" "$overlays_json" "$run_json"
          const [validateRaw, overlaysRaw, runRaw] = process.argv.slice(2);

          function parseJson(label, raw) {
            try {
              return JSON.parse(raw);
            } catch (error) {
              console.error(`${label} output is not valid JSON: ${error.message}`);
              process.exit(1);
            }
          }

          const validateData = parseJson('validate', validateRaw);
          const overlaysData = parseJson('overlays.list', overlaysRaw);
          const runData = parseJson('run', runRaw);

          if (validateData.status !== 'pass' || validateData.command !== 'validate') {
            console.error('validate output contract check failed');
            process.exit(1);
          }

          if (!Array.isArray(overlaysData.overlays) || overlaysData.overlays.length === 0) {
            console.error('overlays.list must return at least one overlay');
            process.exit(1);
          }

          if (runData.status !== 'pass' || runData.command !== 'run') {
            console.error('run output contract check failed');
            process.exit(1);
          }

          console.log('CLI smoke tests passed.');
          NODE

      - name: Upload release tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball-node-${{ matrix.node }}
          path: ${{ env.PACK_TARBALL }}
          if-no-files-found: error
