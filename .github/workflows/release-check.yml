name: Release Check

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check public repo files
        run: |
          test -f LICENSE
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md
          test -f .github/pull_request_template.md
          test -f .github/CODEOWNERS
