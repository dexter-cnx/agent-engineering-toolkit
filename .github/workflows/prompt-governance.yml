name: Prompt Governance

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  prompts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
      - run: python3 tools/prompts/compile_prompts.py
      - run: python3 tools/ci/prompt_lint.py
      - run: python3 tools/prompts/validate_prompt_pack.py
      - name: Ensure compiled prompts are committed
        run: git diff --exit-code prompts/compiled
